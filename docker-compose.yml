services:
  api:
    build: .
    container_name: theeventnetwork-api
    restart: always
    env_file:
      - .env
    expose:
      - "8000"
    depends_on:
      - redis
    networks:
      - apps-network

  redis:
    image: redis:7-alpine
    container_name: theeventnetwork-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - apps-network

volumes:
  redis_data:

networks:
  apps-network:
    external: true