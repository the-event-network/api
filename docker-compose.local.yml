services:
  mongodb:
    image: mongo:7
    container_name: ten-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: eventnetwork

  redis:
    image: redis:7-alpine
    container_name: ten-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  mongodb_data:
  redis_data:
