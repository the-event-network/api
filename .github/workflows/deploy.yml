name: Deploy API to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, theeventnetwork]

    steps:
      - name: Deploy on EC2
        run: |
          cd /home/ubuntu/apps/theeventnetwork
          git fetch origin
          git reset --hard origin/main
          docker compose up -d --build
          docker image prune -f